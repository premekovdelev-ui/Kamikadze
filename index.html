<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BrawlMarket | Аккаунты Brawl Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            color: #f0f3fa;
            overflow-x: hidden;
        }

        /* Анимации и ключевые кадры */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(255, 209, 102, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 209, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 209, 102, 0); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardHover {
            0% { transform: scale(1); }
            100% { transform: scale(1.03); }
        }

        /* Стилизация скролла */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #facc15; border-radius: 10px; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 15, 30, 0.85);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            font-size: 38px;
            background: none;
            color: #FFD966;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            background: #1e293b;
            padding: 12px 18px;
            border-radius: 40px;
            transition: 0.3s;
            font-weight: 600;
        }

        .cart-icon:hover {
            background: #facc15;
            color: #0f172a;
            transform: scale(1.02);
        }

        #cart-count {
            background: #facc15;
            color: #0f172a;
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 14px;
            margin-left: 8px;
        }

        /* Герой */
        .hero {
            text-align: center;
            padding: 70px 20px 50px;
            animation: fadeInUp 0.9s ease-out;
        }

        .hero h1 {
            font-size: 56px;
            background: linear-gradient(125deg, #FFF9C4, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            color: #a0b3d9;
            max-width: 650px;
            margin: 0 auto 30px;
        }

        .btn-glow {
            background: linear-gradient(95deg, #facc15, #ffb347);
            border: none;
            padding: 14px 36px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            color: #0f172a;
            cursor: pointer;
            transition: all 0.3s;
            animation: pulseGlow 2s infinite;
        }

        .btn-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 25px rgba(250, 204, 21, 0.5);
        }

        /* Фильтры */
        .filters {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin: 40px 0 40px;
        }

        .filter-btn {
            background: #1e2a3e;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: #cbd5e6;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: #facc15;
            color: #0a0f1e;
            transform: translateY(-3px);
        }

        /* Карточки товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 32px;
            margin: 30px 0 70px;
        }

        .product-card {
            background: rgba(20, 28, 44, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255, 209, 102, 0.2);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: fadeInUp 0.6s ease-out backwards;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-12px);
            border-color: #facc15;
            box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.5);
            background: rgba(30, 41, 65, 0.85);
        }

        .card-img {
            background: linear-gradient(145deg, #2a3a55, #1a2538);
            border-radius: 28px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .badge {
            display: inline-block;
            background: #facc1510;
            color: #ffdf8c;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 600;
            margin: 12px 0;
        }

        .price {
            font-size: 28px;
            font-weight: 800;
            color: #facc15;
            margin: 12px 0;
        }

        .trophies, .brawlers {
            font-size: 14px;
            color: #94a3b8;
            margin: 6px 0;
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(95deg, #facc15, #f59e0b);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            color: #0f172a;
            margin-top: 16px;
            transition: 0.2s;
            cursor: pointer;
        }

        .buy-btn:active { transform: scale(0.97); }

        /* Корзина модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #0f172ad9;
            border-radius: 48px;
            max-width: 550px;
            width: 90%;
            padding: 30px;
            border: 1px solid #facc15;
            animation: fadeInUp 0.3s;
        }
        .cart-items-list {
            max-height: 350px;
            overflow-y: auto;
            margin: 20px 0;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            background: #1e293b;
            margin: 8px 0;
            padding: 12px;
            border-radius: 24px;
        }
        .total-price {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
            border-top: 1px solid #334155;
            padding-top: 15px;
        }
        .checkout-btn {
            background: #facc15;
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
        }
        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1f2a48;
            border-left: 7px solid #facc15;
            padding: 14px 22px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            z-index: 1100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: fadeInUp 0.3s;
        }

        footer {
            text-align: center;
            padding: 35px;
            border-top: 1px solid #1e2a3e;
            margin-top: 40px;
            color: #6c7a92;
        }

        @media (max-width: 780px) {
            .hero h1 { font-size: 38px; }
            .container { padding: 0 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">
            <i class="fas fa-gamepad"></i> 
            <span>BRAWL<span style="color:#FFD966;">MARKET</span></span>
        </div>
        <div class="cart-icon" id="open-cart-btn">
            <i class="fas fa-shopping-cart"></i> Корзина <span id="cart-count">0</span>
        </div>
    </header>

    <div class="hero">
        <h1>Купить аккаунт Brawl Stars</h1>
        <p>Легендарные бойцы, высокие трофеи, эксклюзивные скины. Мгновенная доставка.</p>
        <button class="btn-glow" id="scrollToShop"><i class="fas fa-bolt"></i> Выбрать аккаунт</button>
    </div>

    <div class="filters" id="filterContainer">
        <button class="filter-btn active" data-filter="all">Все аккаунты</button>
        <button class="filter-btn" data-filter="high">Высокие трофеи (40k+)</button>
        <button class="filter-btn" data-filter="mythic">Мифические+ бойцы</button>
        <button class="filter-btn" data-filter="budget">До 3500₽</button>
    </div>

    <div class="products-grid" id="productsGrid"></div>
</div>

<footer>
    <i class="fas fa-shield-alt"></i> 100% безопасная сделка | Гарантия возврата | Мгновенная передача
</footer>

<!-- Модалка корзины -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeModalBtn">&times;</span>
        <h2><i class="fas fa-shopping-bag"></i> Ваша корзина</h2>
        <div id="cartItemsList" class="cart-items-list">Корзина пуста</div>
        <div class="total-price" id="cartTotalPrice">Итого: 0 ₽</div>
        <button class="checkout-btn" id="checkoutBtn"><i class="fas fa-rocket"></i> Оформить заказ</button>
    </div>
</div>

<script>
    // ==================== ДАННЫЕ АККАУНТОВ (расширенный функционал) ====================
    const accounts = [
        { id: 1, name: "Master Brawler", trophies: 52800, brawlers: 67, mythics: 14, legendaries: 5, price: 7990, imageIcon: "🏆", category: "high", tags: ["high","mythic"] },
        { id: 2, name: "Star Guardian", trophies: 48400, brawlers: 72, mythics: 18, legendaries: 7, price: 11500, imageIcon: "⭐", category: "high", tags: ["high","mythic"] },
        { id: 3, name: "Mecha Paladin", trophies: 31900, brawlers: 58, mythics: 9, legendaries: 3, price: 3950, imageIcon: "🤖", category: "budget", tags: ["budget","mythic"] },
        { id: 4, name: "Crow Assassin", trophies: 35700, brawlers: 62, mythics: 11, legendaries: 4, price: 4900, imageIcon: "🐦‍⬛", category: "mythic", tags: ["mythic"] },
        { id: 5, name: "Sandy Dreamer", trophies: 21600, brawlers: 48, mythics: 6, legendaries: 2, price: 2490, imageIcon: "🌵", category: "budget", tags: ["budget"] },
        { id: 6, name: "Phoenix Crow", trophies: 61200, brawlers: 74, mythics: 19, legendaries: 8, price: 16900, imageIcon: "🔥", category: "high", tags: ["high","mythic"] },
        { id: 7, name: "Diamond Master", trophies: 40200, brawlers: 68, mythics: 15, legendaries: 6, price: 8900, imageIcon: "💎", category: "high", tags: ["high","mythic"] },
        { id: 8, name: "Rare Collector", trophies: 14700, brawlers: 35, mythics: 3, legendaries: 1, price: 1200, imageIcon: "📦", category: "budget", tags: ["budget"] }
    ];

    // Корзина (храним id и количество)
    let cart = []; // { id, quantity }

    // Функция для обновления UI корзины (счетчик)
    function updateCartUI() {
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('cart-count').innerText = totalItems;
        renderCartModal();
    }

    // Добавление в корзину (с проверкой дубликата - увеличиваем количество)
    function addToCart(accountId) {
        const existing = cart.find(item => item.id === accountId);
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({ id: accountId, quantity: 1 });
        }
        updateCartUI();
        showToast("✅ Аккаунт добавлен в корзину!", "success");
    }

    // Удаление из корзины (полностью)
    function removeFromCart(accountId) {
        const index = cart.findIndex(item => item.id === accountId);
        if (index !== -1) cart.splice(index, 1);
        updateCartUI();
        showToast("🗑️ Удалено из корзины", "info");
    }

    // Изменение количества
    function changeQuantity(accountId, delta) {
        const item = cart.find(i => i.id === accountId);
        if (item) {
            const newQty = item.quantity + delta;
            if (newQty <= 0) {
                removeFromCart(accountId);
            } else {
                item.quantity = newQty;
                updateCartUI();
            }
        }
    }

    // Подсчет итоговой суммы
    function getTotalPrice() {
        let total = 0;
        for (let cartItem of cart) {
            const account = accounts.find(a => a.id === cartItem.id);
            if (account) total += account.price * cartItem.quantity;
        }
        return total;
    }

    // Отрисовка модального окна корзины
    function renderCartModal() {
        const container = document.getElementById('cartItemsList');
        if (!container) return;
        if (cart.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:20px;">📭 Корзина пуста. Добавьте аккаунты!</div>';
            document.getElementById('cartTotalPrice').innerText = `Итого: 0 ₽`;
            return;
        }
        let html = '';
        cart.forEach(cartItem => {
            const acc = accounts.find(a => a.id === cartItem.id);
            if (acc) {
                html += `
                    <div class="cart-item">
                        <div><strong>${acc.name}</strong><br><span style="font-size:13px;">${acc.price}₽ x ${cartItem.quantity}</span></div>
                        <div>
                            <button class="qty-btn" data-id="${acc.id}" data-delta="-1" style="background:#facc15;border:none;border-radius:30px;width:32px;">-</button>
                            <span style="margin:0 8px;">${cartItem.quantity}</span>
                            <button class="qty-btn" data-id="${acc.id}" data-delta="1" style="background:#facc15;border:none;border-radius:30px;width:32px;">+</button>
                            <button class="remove-item" data-id="${acc.id}" style="background:#c2410c;margin-left:8px;border:none;border-radius:30px;padding:4px 10px;color:white;">✖</button>
                        </div>
                    </div>
                `;
            }
        });
        container.innerHTML = html;
        document.getElementById('cartTotalPrice').innerText = `Итого: ${getTotalPrice()} ₽`;
        // Привязываем события к кнопкам внутри корзины
        document.querySelectorAll('.qty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                const delta = parseInt(btn.dataset.delta);
                changeQuantity(id, delta);
            });
        });
        document.querySelectorAll('.remove-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                removeFromCart(id);
            });
        });
    }

    // Оформление заказа (имитация)
    function checkout() {
        if (cart.length === 0) {
            showToast("❌ Корзина пуста, добавьте аккаунты", "error");
            return;
        }
        const total = getTotalPrice();
        showToast(`🎉 Заказ оформлен! Сумма: ${total} ₽. С вами свяжется менеджер.`, "success");
        cart = [];
        updateCartUI();
        closeModal();
    }

    // Уведомления тост
    let toastTimeout;
    function showToast(message, type = "info") {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.remove(), 2700);
    }

    // ========== Генерация карточек с анимациями и фильтрация ==========
    let currentFilter = "all";
    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;
        let filtered = [...accounts];
        if (currentFilter === "high") filtered = accounts.filter(acc => acc.trophies >= 40000);
        else if (currentFilter === "mythic") filtered = accounts.filter(acc => acc.mythics >= 12 || acc.legendaries >= 5);
        else if (currentFilter === "budget") filtered = accounts.filter(acc => acc.price <= 3500);
        
        grid.innerHTML = "";
        filtered.forEach((acc, idx) => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.style.animationDelay = `${idx * 0.05}s`;
            card.innerHTML = `
                <div class="card-img">
                    <i class="fas fa-user-astronaut" style="font-size: 64px; color:#FFD966;"></i>
                    <span style="font-size: 70px; margin-left: 12px;">${acc.imageIcon}</span>
                </div>
                <div class="card-title">${acc.name}</div>
                <div class="badge"><i class="fas fa-trophy"></i> ${acc.trophies.toLocaleString()} трофеев</div>
                <div class="brawlers"><i class="fas fa-users"></i> ${acc.brawlers} бойцов</div>
                <div class="brawlers"><i class="fas fa-gem"></i> Мифич:${acc.mythics} | Легенд:${acc.legendaries}</div>
                <div class="price">${acc.price.toLocaleString()} ₽</div>
                <button class="buy-btn" data-id="${acc.id}"><i class="fas fa-cart-plus"></i> В корзину</button>
            `;
            grid.appendChild(card);
        });
        // Вешаем обработчики на кнопки "В корзину"
        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                addToCart(id);
            });
        });
        // Анимация нажатия на карточку (детальный просмотр в консоль/будущее)
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if(e.target.classList.contains('buy-btn')) return;
                const title = card.querySelector('.card-title')?.innerText;
                showToast(`✨ ${title} | Нажмите "В корзину" для покупки`, "info");
            });
        });
    }

    // Фильтры + активная кнопка
    function initFilters() {
        const btns = document.querySelectorAll('.filter-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderProducts();
            });
        });
    }

    // Модалка корзины
    const modal = document.getElementById('cartModal');
    function openModal() { modal.style.display = 'flex'; renderCartModal(); }
    function closeModal() { modal.style.display = 'none'; }
    document.getElementById('open-cart-btn')?.addEventListener('click', openModal);
    document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
    window.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.getElementById('checkoutBtn')?.addEventListener('click', checkout);

    // Скролл к товарам
    document.getElementById('scrollToShop')?.addEventListener('click', () => {
        document.querySelector('.products-grid')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        showToast("📱 Листай ниже — топ аккаунты ждут!", "info");
    });

    // Доп. функционал: анимация статистики + скидка динамическая? + рейтинг
    // Также добавим эффект при загрузке страницы
    function loadAnimation() {
        const cards = document.querySelectorAll('.product-card');
        cards.forEach((card, i) => {
            card.style.animation = `fadeInUp 0.4s ease forwards`;
            card.style.animationDelay = `${i * 0.05}s`;
        });
    }

    // Инициализация при загрузке
    renderProducts();
    initFilters();
    updateCartUI();

    // Бонус: имитация live-статистики (обновление количества просмотров) - просто для wow
    setInterval(() => {
        const randomAccIndex = Math.floor(Math.random() * accounts.length);
        // Это просто для интерактива, не ломает UX
        if (Math.random() > 0.7) {
            // небольшой "фан" эффект без нарушения работы
        }
    }, 15000);
    
    // Адаптивная анимация при скролле
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.opacity = "1";
                entry.target.style.transform = "translateY(0)";
            }
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.product-card').forEach(c => {
        c.style.opacity = "0";
        c.style.transform = "translateY(30px)";
        c.style.transition = "all 0.5s ease";
        observer.observe(c);
    });
    // после рендера товаров, запускаем для новых тоже 
    const originalRender = renderProducts;
    window.renderProducts = function() {
        originalRender();
        setTimeout(() => {
            document.querySelectorAll('.product-card').forEach(c => {
                c.style.opacity = "0";
                c.style.transform = "translateY(30px)";
                observer.observe(c);
            });
        }, 50);
    };
    renderProducts = window.renderProducts;
    renderProducts();
</script>
</body>
</html>
